# Test module overrides for Spring Boot ITs
# Ensure Azure/MSAL wiring is disabled while running integration tests
azure.activedirectory.enabled=false

# BigQuery (dummy values for IT context startup)
polly.aareg.projectId=projectId
polly.aareg.datasetName=datasetName
polly.aareg.tableName=tableName
polly.aareg.bigquery.auth.projectId=projectTeamId

# Allow test configuration to override production beans
spring.main.allow-bean-definition-overriding=true

# Provide concrete values so placeholder resolution doesn't require env vars
azure.activedirectory.plain-client-id=test-client-id
azure.activedirectory.plain-client-secret=test-client-secret
azure.activedirectory.openid-config-token-endpoint=http://localhost:${wiremock.server.port:8080}/azure/token

app.name=test
