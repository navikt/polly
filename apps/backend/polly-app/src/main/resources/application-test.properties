spring.main.allow-bean-definition-overriding=true
spring.main.lazy-initialization=true
polly.security.enabled=false
polly.security.client.enabled=false
codelist.refresh.rate=PT999H
codelist.refresh.initial-delay=PT999H
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never

# Auth header for integrations
app.name: test
app.scope.kodeverk: api://cluster.team.app/.default


# Database
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
#spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.format_sql=true

azure.activedirectory.client-id=test-id:client-id
azure.activedirectory.plain-client-id=test-id
azure.activedirectory.client-secret=test-client-secret:client-secret
azure.activedirectory.plain-client-secret=test-client-secret
azure.activedirectory.openid-config-token-endpoint=test-endpoint
nais.elector.path=localhost:${wiremock.server.port:8080}/elector
behandlingsgrunnlag.distribute.rate.seconds=-1
client.term-catalog.url=http://localhost:${wiremock.server.port:8080}/termcatalog
client.teamcat.url=http://localhost:${wiremock.server.port:8080}/teamcat
client.nom.graphql.url=http://localhost:${wiremock.server.port:8080}/nom/graphql
client.common-code.nav.url=http://localhost:${wiremock.server.port:8080}/commoncode

# BigQuery properties
polly.aareg.projectId=projectId
polly.aareg.datasetName=datasetName
polly.aareg.tableName=tableName
polly.aareg.bigquery.auth.projectId=projectTeamId
